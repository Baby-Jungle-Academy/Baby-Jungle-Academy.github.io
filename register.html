<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التسجيل – بيبي جانجل أكاديمي | Baby Jungle Academy</title>
<meta name="description" content="نموذج تسجيل الأطفال في حضانة بيبي جانجل أكاديمي بمدينة نصر – سجل الآن للالتحاق ببرامج الرعاية والتعليم المبكر.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://Baby-Jungle-Academy.github.io/register">
<link rel="alternate" hreflang="ar" href="https://Baby-Jungle-Academy.github.io/register">
<link rel="alternate" hreflang="en" href="https://Baby-Jungle-Academy.github.io/register-en">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--clr-primary:#0F6B3A;--clr-primary-dark:#0A4D2A;--clr-primary-light:#E8F5E9;--clr-accent:#D97706;--clr-text:#1A1A1A;--clr-text-light:#4B5563;--clr-bg:#FFFFFF;--clr-bg-alt:#F9FAFB;--clr-border:#E5E7EB;--radius:12px;--font-primary:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--max-w:1120px;--transition:0.2s ease}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-primary);color:var(--clr-text);background:var(--clr-bg-alt);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--clr-primary);text-decoration:none;transition:color var(--transition)}
a:hover{color:var(--clr-primary-dark)}
a:focus-visible{outline:3px solid var(--clr-accent);outline-offset:2px;border-radius:4px}
.container{max-width:var(--max-w);margin:0 auto;padding:0 20px}
.header{background:var(--clr-white);border-bottom:1px solid var(--clr-border);position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;max-width:var(--max-w);margin:0 auto;gap:16px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;color:var(--clr-primary);text-decoration:none}
.logo-icon{font-size:1.8rem}
.lang-switch{background:var(--clr-primary-light);color:var(--clr-primary);padding:8px 16px;border-radius:8px;font-weight:600;font-size:0.9rem;transition:background var(--transition)}
.lang-switch:hover{background:var(--clr-primary);color:var(--clr-white);text-decoration:none}
.main{flex:1;padding:40px 20px}
.page-title{text-align:center;margin-bottom:32px}
.page-title h1{font-size:1.75rem;font-weight:700;color:var(--clr-primary);margin-bottom:8px}
.page-title p{font-size:1rem;color:var(--clr-text-light);max-width:600px;margin:0 auto}
.form-wrap{max-width:700px;margin:0 auto;background:var(--clr-white);border-radius:var(--radius);box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden}
.form-wrap iframe{display:block;width:100%;height:1280px;border:0}
.form-note{text-align:center;margin-top:16px;font-size:0.85rem;color:var(--clr-text-light)}
.form-note a{color:var(--clr-primary);text-decoration:underline}
.footer{background:var(--clr-primary-dark);color:var(--clr-white);text-align:center;padding:24px 20px;font-size:0.85rem;margin-top:auto}
.footer a{color:var(--clr-accent-light)}
@media(max-width:600px){.form-wrap iframe{height:1400px}}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
<a href="/" class="logo" aria-label="الرئيسية">
<span class="logo-icon" aria-hidden="true">🌴</span>
<span>بيبي جانجل أكاديمي</span>
</a>
<nav aria-label="الملاحة الرئيسية">
<a href="/register-en" class="lang-switch" aria-label="English registration" hreflang="en">English</a>
</nav>
</div>
</header>

<main class="main">
<div class="container">
<div class="page-title">
<h1>التسجيل في الأكاديمية</h1>
<p>املأ النموذج أدناه لتسجيل طفلك في بيبي جانجل أكاديمي. سيتم التواصل معك في أقرب وقت.</p>
</div>
<div class="form-wrap">
<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeJRn6JZCyyXzqsptXzG-InJiCY-K-Cliu_6P5-NxbdrWbRKQ/viewform?embedded=true" title="نموذج تسجيل الأطفال" loading="lazy">Loading…</iframe>
</div>
<p class="form-note">بياناتك آمنة ومحمية — اطلع على <a href="/privacy-policy">سياسة الخصوصية</a></p>
</div>
</main>

<footer class="footer">
<div>
&copy; 2026 بيبي جانجل أكاديمي &nbsp;|&nbsp; <a href="/">الرئيسية</a>
</div>
</footer>

</body>
</html>
